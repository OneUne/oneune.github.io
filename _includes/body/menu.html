<div id="_navbar" class="navbar fixed-top">
  <div class="content">
    <span class="sr-only">{{ site.data.strings.jump_to | default:"Jump to" }}{{ site.data.strings.colon | default:":" }}</span>
    <div class="nav-btn-bar">
      <!-- Mobile hamburger -->
      <a id="_menu" class="nav-btn no-hover" href="#_drawer--opened">
        <span class="sr-only">{{ site.data.strings.navigation | default:"Navigation" }}</span>
        <span class="icon-menu"></span>
      </a>

      <!-- Desktop buttons: LEFT side (before nav-span) -->

      <!-- Sidebar toggle: desktop only (64em+) -->
      <button id="_sidebar-toggle" class="nav-btn no-hover nav-btn-custom" title="사이드바 토글" aria-label="사이드바 보기/숨기기">
        <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/>
        </svg>
      </button>

      <!-- TOC toggle: shown only on pages that have a TOC -->
      <button id="_toc-toggle" class="nav-btn no-hover nav-btn-custom" title="목차 토글" aria-label="목차 보기/숨기기" style="display:none">
        <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/>
          <line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>
        </svg>
      </button>

      <!-- Search toggle -->
      <button id="_search-toggle" class="nav-btn no-hover nav-btn-custom" title="검색 (⌘K)" aria-label="검색">
        <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </button>

      <!-- Spacer: pushes buttons left, rest of nav to right -->
      <div class="nav-span"></div>
    </div>
  </div>
</div>
<hr class="sr-only" hidden />

<!-- Search overlay -->
<div id="_search-overlay" role="dialog" aria-label="검색" aria-modal="true" style="display:none">
  <div class="search-backdrop" id="_search-backdrop"></div>
  <div class="search-container">
    <div class="search-input-wrap">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;margin-right:0.5rem;opacity:0.4" aria-hidden="true">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="search" id="_search-input" placeholder="포스트 제목, 태그 검색..." autocomplete="off" spellcheck="false">
      <button id="_search-close" class="search-close-btn" aria-label="닫기">✕</button>
    </div>
    <div id="_search-results" class="search-results" role="listbox"></div>
  </div>
</div>

<script>
(function() {
  var body = document.body;
  var html = document.documentElement;

  // Transfer classes from <html> (FOUC prevention) to <body>
  ['focus-mode', 'no-toc'].forEach(function(cls) {
    if (html.classList.contains(cls)) {
      html.classList.remove(cls);
      body.classList.add(cls);
    }
  });

  // ── Sidebar Toggle ──────────────────────────────────────────────────────────
  var sidebarBtn = document.getElementById('_sidebar-toggle');
  if (sidebarBtn) {
    sidebarBtn.classList.toggle('nav-btn-off', body.classList.contains('focus-mode'));
    sidebarBtn.addEventListener('click', function() {
      var off = body.classList.toggle('focus-mode');
      localStorage.setItem('hy-focus-mode', off ? '1' : '');
      sidebarBtn.classList.toggle('nav-btn-off', off);
    });
  }

  // ── TOC Toggle ──────────────────────────────────────────────────────────────
  var tocBtn = document.getElementById('_toc-toggle');
  if (tocBtn) {
    var hasToc = !!document.getElementById('markdown-toc');
    if (hasToc) {
      tocBtn.style.display = '';
      tocBtn.classList.toggle('nav-btn-off', body.classList.contains('no-toc'));
      tocBtn.addEventListener('click', function() {
        var off = body.classList.toggle('no-toc');
        localStorage.setItem('hy-no-toc', off ? '1' : '');
        tocBtn.classList.toggle('nav-btn-off', off);
      });
    }
  }

  // ── Search ──────────────────────────────────────────────────────────────────
  var searchToggle   = document.getElementById('_search-toggle');
  var searchOverlay  = document.getElementById('_search-overlay');
  var searchInput    = document.getElementById('_search-input');
  var searchResults  = document.getElementById('_search-results');
  var searchClose    = document.getElementById('_search-close');
  var searchBackdrop = document.getElementById('_search-backdrop');
  var searchData     = null;

  function openSearch() {
    searchOverlay.style.display = '';
    searchInput.value = '';
    searchResults.innerHTML = '';
    document.body.style.overflow = 'hidden';
    setTimeout(function() { searchInput.focus(); }, 50);
    if (!searchData) loadSearchData();
  }
  function closeSearch() {
    searchOverlay.style.display = 'none';
    document.body.style.overflow = '';
  }
  async function loadSearchData() {
    try {
      var res = await fetch('{{ "/assets/sitedata.json" | relative_url }}');
      searchData = await res.json();
    } catch(e) { searchData = []; }
  }
  function doSearch(q) {
    if (!q || !searchData) return [];
    var lq = q.toLowerCase();
    return searchData.filter(function(p) {
      return (p.title       || '').toLowerCase().includes(lq) ||
             (p.tags        || '').toLowerCase().includes(lq) ||
             (p.description || '').toLowerCase().includes(lq);
    }).slice(0, 10);
  }
  function renderResults(q) {
    var results = doSearch(q);
    if (!q) { searchResults.innerHTML = ''; return; }
    if (!results.length) {
      searchResults.innerHTML = '<div class="search-no-result">결과 없음</div>';
      return;
    }
    searchResults.innerHTML = results.map(function(p) {
      var hi = function(s) {
        if (!s) return '';
        return s.replace(new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi'), '<mark>$1</mark>');
      };
      return '<a href="' + p.url + '" class="search-result-item" role="option">' +
        '<div class="search-result-title">' + hi(p.title) + '</div>' +
        '<div class="search-result-meta">' + (p.date || '') + (p.tags ? ' · ' + p.tags : '') + '</div>' +
        (p.description ? '<div class="search-result-desc">' + hi(p.description) + '</div>' : '') +
        '</a>';
    }).join('');
  }

  if (searchToggle)  searchToggle.addEventListener('click', openSearch);
  if (searchClose)   searchClose.addEventListener('click', closeSearch);
  if (searchBackdrop) searchBackdrop.addEventListener('click', closeSearch);
  if (searchInput)   searchInput.addEventListener('input', function() { renderResults(this.value.trim()); });
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeSearch();
    if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); openSearch(); }
  });
  document.addEventListener('hy-push-state-load', closeSearch);
})();
</script>

<script>
// ── TOC Scroll Spy ────────────────────────────────────────────────────────────
(function() {
  function initScrollSpy() {
    var toc = document.getElementById('markdown-toc');
    if (!toc) return;

    var headings = Array.from(document.querySelectorAll('.content h1[id], .content h2[id], .content h3[id], .content h4[id], .content h5[id], .content h6[id]'));
    if (!headings.length) return;

    var tocLinks = Array.from(toc.querySelectorAll('a'));
    var activeLink = null;

    function setActive(link) {
      if (activeLink === link) return;
      if (activeLink) activeLink.classList.remove('toc-active');
      activeLink = link;
      if (activeLink) {
        activeLink.classList.add('toc-active');
        // scroll TOC to keep active item visible
        var li = activeLink.parentElement;
        var tocRect = toc.getBoundingClientRect();
        var liRect = li.getBoundingClientRect();
        if (liRect.top < tocRect.top || liRect.bottom > tocRect.bottom) {
          li.scrollIntoView({ block: 'nearest' });
        }
      }
    }

    function onScroll() {
      var scrollY = window.scrollY || window.pageYOffset;
      var offset = 120; // navbar height buffer
      var current = null;
      for (var i = headings.length - 1; i >= 0; i--) {
        if (headings[i].getBoundingClientRect().top + scrollY - offset <= scrollY) {
          current = headings[i];
          break;
        }
      }
      if (!current && headings.length) current = headings[0];
      var link = current ? toc.querySelector('a[href="#' + CSS.escape(current.id) + '"]') : null;
      setActive(link);
    }

    window.addEventListener('scroll', onScroll, { passive: true });
    onScroll();
  }

  // Run on initial load and on Hydejack push-state navigation
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initScrollSpy);
  } else {
    initScrollSpy();
  }
  document.addEventListener('hy-push-state-load', function() {
    setTimeout(initScrollSpy, 100);
  });
})();
</script>
